fields:
  - name: product
    logical_type:
      name: string
    representations:
      - pattern: "(?P<value>.+)"
  - name: price
    logical_type:
      name: decimal
      args:
        as_float: true
    representations:
      - pattern: "(?P<value>[0-9]+\\.[0-9]+)"
  - name: quantity
    logical_type:
      name: integer
    representations:
      - pattern: "(?P<value>[0-9]+)"
